{% extends "base.html" %}
{% block title %}Edit Waste Center | WasteWise AI{% endblock %}
{% block page_name %}edit-center{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="content-card">
            <h3 class="mb-3">Edit Waste Center</h3>
            <p class="text-muted">Update center details to keep location search and pricing accurate for users.</p>

            <form method="POST" id="center-form">
                    <div class="mb-3">
                        <label class="form-label">Center ID</label>
                        <input type="text" class="form-control" value="{{ center.id }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="center_name" class="form-label">Center Name</label>
                        <input type="text" class="form-control" id="center_name" name="center_name" value="{{ center.center_name }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="latitude" class="form-label">Latitude</label>
                            <input type="number" step="any" class="form-control" id="latitude" name="latitude" value="{{ center.latitude }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="longitude" class="form-label">Longitude</label>
                            <input type="number" step="any" class="form-control" id="longitude" name="longitude" value="{{ center.longitude }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Waste Category</label>
                        <select class="form-select" id="category" name="category" required>
                            {% for cat in categories %}
                                <option value="{{ cat }}" {% if cat == center.category %}selected{% endif %}>{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="price_per_kg" class="form-label">Price per kg</label>
                        <input type="number" step="0.01" min="0" class="form-control" id="price_per_kg" name="price_per_kg" value="{{ center.price_per_kg }}" required>
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="submit" class="btn btn-accent">Update Center</button>
                        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
