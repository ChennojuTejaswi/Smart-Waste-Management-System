{% extends "base.html" %}
{% block title %}User Login | WasteWise AI{% endblock %}
{% block page_name %}user-login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="content-card">
            <h3 class="mb-3">User Login</h3>
            <p class="text-muted">Login to classify your waste image and discover nearest collection centers.</p>

            <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-accent">Login</button>
                    <p class="mt-3 mb-0">New user? <a href="{{ url_for('user_register') }}">Register here</a></p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
